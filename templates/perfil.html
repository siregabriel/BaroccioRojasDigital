<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Mi perfil · Baroccio Rojas Digital</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <header class="login-top">
    <span class="login-logo-chip">
      <img src="{{ url_for('static', filename='baroccio-rojas-logo.png') }}" alt="Baroccio, Rojas & Co." class="login-logo">
    </span>
  </header>
  <div class="auth-card">
    <h2>Mi perfil</h2>
    <p class="sub">{{ 'Abogado' if g.usuario.es_abogado else 'Cliente' }}</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <label for="nombre">Nombre completo</label>
      <input type="text" id="nombre" name="nombre" value="{{ g.usuario.nombre }}" required>
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" value="{{ g.usuario.email }}" required>
      <button type="submit" class="login-btn">Guardar cambios</button>
    </form>
    <a class="volver" href="{{ url_for('cambiar_password') }}">Cambiar mi contraseña →</a>
    <a class="volver" href="{{ url_for('index') }}" style="margin-top:8px">← Volver</a>
  </div>
<script>
(function(){var t=document.querySelector('meta[name=csrf-token]');if(!t)return;var k=t.getAttribute('content');
document.querySelectorAll('form').forEach(function(f){if((f.getAttribute('method')||'').toLowerCase()==='post'&&!f.querySelector('input[name=csrf_token]')){var i=document.createElement('input');i.type='hidden';i.name='csrf_token';i.value=k;f.appendChild(i);}});})();
</script>
</body>
</html>
