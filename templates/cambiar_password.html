<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Cambiar contraseña · Baroccio Rojas Digital</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <header class="login-top">
    <span class="login-logo-chip">
      <img src="{{ url_for('static', filename='baroccio-rojas-logo.png') }}" alt="Baroccio, Rojas & Co." class="login-logo">
    </span>
  </header>
  <div class="auth-card">
    <h2>Cambiar contraseña</h2>
    <p class="sub">{{ g.usuario.nombre }}</p>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
    {% endwith %}
    <form method="post">
      <label for="actual">Contraseña actual</label>
      <input type="password" id="actual" name="actual" required autofocus>
      <label for="password">Nueva contraseña</label>
      <input type="password" id="password" name="password" minlength="8" required>
      <label for="password2">Confirmar nueva contraseña</label>
      <input type="password" id="password2" name="password2" minlength="8" required>
      <button type="submit" class="login-btn">Actualizar contraseña</button>
    </form>
    <a class="volver" href="{{ url_for('index') }}">← Volver al portal</a>
  </div>
<script>
(function(){var t=document.querySelector('meta[name=csrf-token]');if(!t)return;var k=t.getAttribute('content');
document.querySelectorAll('form').forEach(function(f){if((f.getAttribute('method')||'').toLowerCase()==='post'&&!f.querySelector('input[name=csrf_token]')){var i=document.createElement('input');i.type='hidden';i.name='csrf_token';i.value=k;f.appendChild(i);}});})();
</script>
</body>
</html>
