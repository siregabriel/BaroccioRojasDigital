{% extends "admin/base_admin.html" %}
{% block title %}Editar caso{% endblock %}
{% block content %}
<p style="margin-bottom:14px"><a href="{{ url_for('admin_casos') }}" style="color:var(--muted);font-size:13px">← Volver a Casos</a></p>
<h1 class="page-title">Editar caso</h1>
<p class="page-sub">{{ caso.referencia }} · Cliente: {{ caso.cliente.nombre }}</p>

<div class="panel panel-pad" style="max-width:620px">
  <form method="post">
    <label>Título</label><input type="text" name="titulo" value="{{ caso.titulo }}" required>
    <div class="form-row">
      <div><label>Tipo</label><input type="text" name="tipo" value="{{ caso.tipo }}"></div>
      <div><label>Estado</label>
        <select name="estado">
          {% for e in ['Activo','En revisión','Cerrado'] %}
          <option {{ 'selected' if caso.estado==e }}>{{ e }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <label>Abogado responsable</label><input type="text" name="abogado" value="{{ caso.abogado }}">
    <label>Descripción</label><textarea name="descripcion" rows="5">{{ caso.descripcion }}</textarea>
    <button class="btn-pay" style="float:none;width:100%;margin-top:8px" type="submit">Guardar cambios</button>
  </form>
</div>
{% endblock %}
