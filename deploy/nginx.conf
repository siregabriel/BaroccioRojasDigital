# Configuración de Nginx (proxy inverso a Gunicorn).
# Copiar a:  /etc/nginx/sites-available/baroccio
# Activar:   sudo ln -s /etc/nginx/sites-available/baroccio /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# El SSL lo añade Certbot automáticamente (ver DEPLOY.md).

server {
    listen 80;
    server_name barocciorojasdigital.com www.barocciorojasdigital.com;

    # Tamaño máximo de archivo subido (coincide con MAX_CONTENT_LENGTH de Flask)
    client_max_body_size 25M;

    # Archivos estáticos servidos directamente por Nginx (más rápido)
    location /static/ {
        alias /var/www/baroccio/static/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
